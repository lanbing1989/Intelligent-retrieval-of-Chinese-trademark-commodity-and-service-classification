# 商标查询系统 Nginx 配置文件

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # 字符集
    charset utf-8;

    # 日志配置
    access_log /var/log/nginx/trademark-access.log;
    error_log /var/log/nginx/trademark-error.log;

    # 禁止访问敏感文件
    location ~ /\.(sql|log|ini|conf|md|git|env)$ {
        deny all;
        return 404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }

    # 保护配置文件
    location = /config.php {
        deny all;
        return 404;
    }

    # API 接口处理
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
        
        # CORS 配置（如需要跨域）
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # PHP 文件处理
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;  # PHP-FPM 地址，根据实际情况修改
        # fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;  # 使用 Unix Socket 时
        
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # PHP 配置
        fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M \n max_execution_time=300 \n memory_limit=256M";
    }

    # 静态文件缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 主入口
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
    
    location = /404.html {
        internal;
    }
    
    location = /500.html {
        internal;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
